<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" width="768" height="768">
  <defs>
    <style>
      .logo-bg { fill: #f5f5f0; }
      .logo-outer-ring { fill: none; stroke: #6b8d73; stroke-width: 24; }
      .logo-mountain { fill: #8ba878; }
      .logo-mountain-dark { fill: #4a6b4f; }
      .logo-mountain-light { fill: #b4d4a8; }
      .logo-house { fill: #f5f5f0; }
      .logo-roof { fill: #6b8d73; }
      .logo-trees { fill: #4a6b4f; }
      .logo-text { fill: #1d4a2a; font-family: 'Arial', sans-serif; font-weight: bold; }
      .logo-text-main { font-size: 96px; letter-spacing: 4px; }
      .logo-text-sub { font-size: 56px; letter-spacing: 6px; }
    </style>
  </defs>
  
  <!-- Background -->
  <circle cx="384" cy="384" r="370" class="logo-bg"/>
  
  <!-- Outer ring -->
  <circle cx="384" cy="384" r="370" class="logo-outer-ring"/>
  
  <!-- Mountains and landscape -->
  <g id="landscape">
    <!-- Back mountain -->
    <path d="M 150 350 Q 280 150 380 200 Q 480 150 600 350 Z" class="logo-mountain-light"/>
    
    <!-- Middle mountain -->
    <path d="M 180 380 Q 300 240 384 280 Q 470 240 580 380 Z" class="logo-mountain"/>
    
    <!-- Front mountain -->
    <path d="M 200 420 Q 320 280 384 340 Q 450 280 560 420 Z" class="logo-mountain-dark"/>
  </g>
  
  <!-- House -->
  <g id="house" transform="translate(500, 320)">
    <!-- Roof -->
    <polygon points="0,-40 50,-70 100,-40" class="logo-roof"/>
    <!-- House body -->
    <rect x="0" y="-40" width="100" height="80" class="logo-house" stroke="#6b8d73" stroke-width="2"/>
    <!-- Door -->
    <rect x="35" y="20" width="30" height="40" class="logo-roof"/>
  </g>
  
  <!-- Trees -->
  <g id="trees" transform="translate(520, 380)">
    <!-- Tree 1 -->
    <rect x="5" y="35" width="8" height="25" class="logo-roof"/>
    <polygon points="9,35 0,15 18,15" class="logo-trees"/>
    <!-- Tree 2 -->
    <rect x="30" y="30" width="8" height="30" class="logo-roof"/>
    <polygon points="34,30 22,5 46,5" class="logo-trees"/>
  </g>
  
  <!-- Text -->
  <text x="384" y="580" text-anchor="middle" class="logo-text logo-text-main">STAYVISTA</text>
  <text x="384" y="650" text-anchor="middle" class="logo-text logo-text-sub">TAGAYTAY</text>
</svg>